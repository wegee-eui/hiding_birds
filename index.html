<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spherical Surface Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let rotX = 0.5; // 구의 상단이 보이도록 초기 각도 설정
    let rotY = 0;
    const planetRadius = 3000; // 구체의 크기

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
    }

    function draw() {
        background(255); // 전체 흰색 배경

        // 드래그 인터랙션: 구를 회전시켜 표면을 이동하는 효과
        if (mouseIsPressed) {
            rotY += (mouseX - pmouseX) * 0.005;
            rotX -= (mouseY - pmouseY) * 0.005;
        }

        // 카메라 설정: 구체의 윗부분이 화면 하단에 걸치도록 배치
        // (x, y, z, lookAtX, lookAtY, lookAtZ)
        camera(0, -planetRadius - 400, 1200, 0, -planetRadius, 0, 0, 1, 0);

        // 아주 미세한 음영을 주어 구의 입체감만 살림 (없으면 평면처럼 보임)
        ambientLight(240);
        directionalLight(255, 255, 255, 0, 1, -1);

        push();
        rotateY(rotY);
        rotateX(rotX);

        // 흰색 구체 (바닥 역할)
        fill(255);
        noStroke();
        // 구의 디테일(세그먼트)을 높여 매끄럽게 표현
        sphere(planetRadius, 64, 64); 
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
