<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Soft Sphere Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let rotX = 0.4; 
    let rotY = 0;
    const planetRadius = 3000; 

    function setup() {
        // 배경을 아주 살짝 회색(#f0f0f0)으로 설정하여 흰색 구체와 대비를 줍니다.
        createCanvas(windowWidth, windowHeight, WEBGL);
    }

    function draw() {
        // 배경을 구체보다 아주 약간 어둡게 해서 경계를 만듭니다.
        background(240); 

        if (mouseIsPressed) {
            rotY += (mouseX - pmouseX) * 0.005;
            rotX -= (mouseY - pmouseY) * 0.005;
        }

        // 카메라 설정
        camera(0, -planetRadius - 800, 1800, 0, -planetRadius, 0, 0, 1, 0);

        // [입체감을 위한 그림자 및 조명 설계]
        
        // 1. 환경광: 구체의 어두운 부분을 연한 회색으로 채움
        ambientLight(180); 
        
        // 2. 핵심 광원: 위에서 아래로 비추는 강한 빛 (입체감 형성)
        directionalLight(255, 255, 255, 0, 1, -1); 
        
        // 3. 역광(Rim Light): 구체 뒤쪽에서 빛을 쏘아 외곽선을 배경과 분리
        pointLight(255, 255, 255, 0, -planetRadius - 2000, -1000);

        push();
        rotateY(rotY);
        rotateX(rotX);

        // [구체 스타일링]
        // 선(Stroke)을 아주 연한 회색으로 넣어 형태를 확실히 잡습니다.
        stroke(200, 100); 
        strokeWeight(0.5);
        
        // 구체 내부 색상
        fill(255);
        
        // 구체의 해상도를 높여서 아주 매끄럽게 표현
        sphere(planetRadius, 48, 48); 
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
