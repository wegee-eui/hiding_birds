<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spherical Horizon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let rotX = 0.4; 
    let rotY = 0;
    const planetRadius = 3000; 

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
    }

    function draw() {
        background(255); 

        if (mouseIsPressed) {
            rotY += (mouseX - pmouseX) * 0.005;
            rotX -= (mouseY - pmouseY) * 0.005;
        }

        // 카메라 위치 조정 (구의 능선이 더 잘 보이도록)
        camera(0, -planetRadius - 600, 1500, 0, -planetRadius, 0, 0, 1, 0);

        // [입체감의 핵심: 조명 설정]
        // 1. 전체적인 어두운 부분의 밝기 (너무 낮추면 검게 보이고, 너무 높으면 평면이 됩니다)
        ambientLight(150); 
        
        // 2. 강한 직사광선 (위쪽에서 비스듬히 내려오는 빛을 주어 하이라이트와 그림자 생성)
        // 마치 태양광처럼 작동하여 구의 곡면을 따라 명암 변화를 만듭니다.
        directionalLight(255, 255, 255, 0.5, 1, -0.5); 
        
        // 3. 점광원 (카메라 근처에서 비추는 보조광)
        pointLight(200, 200, 200, 0, -planetRadius - 1000, 500);

        push();
        rotateY(rotY);
        rotateX(rotX);

        // 구체의 재질 설정
        // 스펙큘러 마테리얼은 빛을 반사하여 입체감을 더 살려줍니다.
        specularMaterial(255);
        shininess(10); // 반사광의 세기
        
        noStroke();
        // 구의 해상도를 높여서 부드러운 곡면 표현
        sphere(planetRadius, 100, 100); 
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
