<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sphere with High Contrast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f5f5f5; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let rotX = 0; 
    let rotY = 0;
    const planetRadius = 2500; // 구체의 크기

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
    }

    function draw() {
        // 배경을 연한 회색(#f5f5f5)으로 설정하여 흰색 구체와 대비 형성
        background(245); 

        // 드래그 인터랙션: 구를 회전시켜 탐험
        if (mouseIsPressed) {
            rotY += (mouseX - pmouseX) * 0.005;
            rotX -= (mouseY - pmouseY) * 0.005;
        }

        // [1. 완벽한 정원을 위한 카메라 설정 조정]
        // aspect ratio를 가로/세로 비율로 고정하여 구체가 찌그러지지 않게 함
        let aspect = width / height;
        perspective(PI / 3, aspect, 10, 15000); // 시야각(FOV)을 조금 더 좁혀서 왜곡 최소화
        
        // 카메라 위치를 구체 정중앙에서 조금 뒤로 배치
        camera(0, 0, 1500, 0, 0, 0, 0, 1, 0);

        // [2. 입체감 강화를 위한 극적인 조명 설계]
        
        // A. 환경광: 어두운 부분을 연한 회색으로 채워 그림자를 자연스럽게 만듦
        ambientLight(100); 
        
        // B. 핵심 측면광 (Key Light): 왼쪽 상단 비스듬한 곳에서 강한 빛 투사
        // 이 조명이 구체의 둥근 곡면을 따라 명암 대비를 만듭니다.
        directionalLight(255, 255, 255, 1, 1, -1); 
        
        // C. 보조광 (Fill Light): 오른쪽 하단에서 약한 빛을 주어 그림자 디테일 살림
        directionalLight(100, 100, 100, -1, -1, 0.5);

        push();
        rotateY(rotY);
        rotateX(rotX);

        // [3. 구체 스타일링]
        // 연한 와이어프레임을 넣어 입체감을 직관적으로 인지하게 함 (없으면 평면처럼 보임)
        stroke(180, 80); 
        strokeWeight(0.6);
        
        // 구체 내부 색상
        fill(255);
        
        // 구체의 해상도를 높여서 아주 매끄럽게 표현
        sphere(planetRadius, 60, 60); 
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
