<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Perspective Hairline Jungle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #e5e5e5; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let lines = [];
    const lineCount = 5000; // 요청하신 대로 5000개 설정
    const worldWidth = 6000;
    const worldDepth = 8000; // 깊이감(소실점 방향)을 위해 더 길게 설정
    
    let camX = 0, camY = -200, camZ = 0; // 카메라 초기 위치

    function setup() {
        // WEBGL 모드로 전환하여 3D 원근감 활성화
        createCanvas(windowWidth, windowHeight, WEBGL);
        
        for (let i = 0; i < lineCount; i++) {
            lines.push(generate3DHair());
        }
    }

    function draw() {
        background(230); // 배경색

        // 마우스 드래그로 시점 이동 (원근감 탐험)
        if (mouseIsPressed) {
            camX -= (mouseX - pmouseX) * 2;
            camZ -= (mouseY - pmouseY) * 5; // 위아래 드래그 시 깊숙이 들어가는 효과
        }

        // 카메라 설정 (소실점 형성)
        // perspective(시야각, 종횡비, 가까운 평면, 먼 평면)
        perspective(PI / 3, width / height, 10, 10000);
        camera(camX, camY, camZ + 1000, camX, camY, camZ, 0, 1, 0);

        // 5000개의 선 그리기
        noFill();
        for (let l of lines) {
            // 거리에 따른 투명도 조절 (너무 먼 선은 안개처럼 사라짐)
            let distance = abs(l.startZ - camZ);
            let alpha = map(distance, 0, 5000, 150, 0);
            if (alpha < 0) continue; // 화면 밖 선은 계산 제외(성능 최적화)

            stroke(0, alpha);
            strokeWeight(l.weight);
            
            beginShape();
            for (let v of l.points) {
                vertex(v.x, v.y, v.z);
            }
            endShape();
        }
    }

    function generate3DHair() {
        let points = [];
        // X는 가로, Y는 높이(바닥 근처), Z는 깊이
        let startX = random(-worldWidth, worldWidth);
        let startY = random(200, 800); // 아래쪽에 깔리도록 설정
        let startZ = random(-worldDepth, 1000);
        
        let x = startX;
        let y = startY;
        let z = startZ;
        
        let segments = random(30, 80);
        let noiseScale = 0.001;

        for (let i = 0; i < segments; i++) {
            // 3차원 노이즈로 사방으로 뻗는 머리카락 구현
            let angleH = noise(x * noiseScale, z * noiseScale) * TWO_PI * 2;
            let angleV = noise(y * noiseScale, i * 0.01) * PI;
            
            x += cos(angleH) * 20;
            y -= sin(angleV) * 15; // 위로 솟구치는 느낌 추가
            z += sin(angleH) * 20;
            
            points.push({x: x, y: y, z: z});
        }

        return {
            points: points,
            weight: random(0.2, 1.2), // 가까운 선은 더 굵게 보이도록 랜덤값 부여
            startZ: startZ
        };
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
