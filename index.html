<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dense Hairline Jungle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2f2f2; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let lines = [];
    let offsetX = 0;
    let offsetY = 0;
    const worldSize = 5000; // 탐험 영역을 더 넓게 설정
    const lineCount = 3500; // 선의 개수를 대폭 늘림

    function setup() {
        createCanvas(windowWidth, windowHeight);
        // 고해상도 출력을 위해 선 데이터를 미리 생성
        for (let i = 0; i < lineCount; i++) {
            lines.push(generateLongHair());
        }
        
        offsetX = -worldSize / 2 + width / 2;
        offsetY = -worldSize / 2 + height / 2;
    }

    function draw() {
        background(242); 

        if (mouseIsPressed) {
            offsetX += mouseX - pmouseX;
            offsetY += mouseY - pmouseY;
        }

        push();
        translate(offsetX, offsetY);

        // 이미지 느낌을 살리기 위해 선의 스타일을 세밀하게 조정
        noFill();
        for (let l of lines) {
            stroke(l.color, l.opacity); 
            strokeWeight(l.weight);
            
            beginShape();
            for (let v of l.points) {
                // 베지어 곡선 대신 curveVertex를 사용하여 길고 부드러운 선 구현
                curveVertex(v.x, v.y);
            }
            endShape();
        }
        pop();
    }

    function generateLongHair() {
        let points = [];
        let x = random(-worldSize, worldSize);
        let y = random(-worldSize, worldSize);
        
        // 선의 길이를 결정하는 세그먼트 수 (더 길게 설정)
        let segments = random(40, 120); 
        let noiseScale = 0.002; // 곡률을 더 완만하고 유기적으로

        for (let i = 0; i < segments; i++) {
            let angle = noise(x * noiseScale, y * noiseScale, i * 0.01) * TWO_PI * 6;
            x += cos(angle) * 12; // 한 스텝당 이동 거리
            y += sin(angle) * 12;
            points.push({x: x, y: y});
        }

        return {
            points: points,
            weight: random(0.3, 0.8), // 선마다 미세하게 다른 굵기
            opacity: random(20, 70),  // 겹쳤을 때 깊이감을 주는 투명도
            color: random() > 0.95 ? 100 : 0 // 가끔 흐린 선을 섞어 레이어감 형성
        };
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
