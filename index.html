<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hidden Message - Hello</title>
    <style>
        /* 폰트 설정 (jgs-font 파일 경로를 확인하세요) */
        @font-face {
            font-family: 'jgs-font';
            src: url('fonts/jgs_font.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        }

        :root {
            --target-color: #00fff0; /* 고정된 글자 및 초기 배경색 */
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--target-color); /* 배경색 초기화 */
            font-family: 'jgs-font', sans-serif;
            overflow: hidden;
            transition: background-color 0.1s linear;
        }

        /* 글자 스타일: 색상과 크기를 완전히 고정 */
        .hidden-text {
            font-size: 8rem;
            color: var(--target-color) !important; /* 무조건 00fff0 유지 */
            user-select: none;
            cursor: default;
            letter-spacing: -2px;
            margin: 0;
            transition: none; /* 크기 변화 방지 */
        }

        /* 하단 투명 슬라이더 컨테이너 */
        .controller {
            position: absolute;
            bottom: 60px;
            width: 280px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.15); /* 반투명 흰색 */
            backdrop-filter: blur(8px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            height: 3px;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
        }

        /* 글자가 보일 때 클릭 가능 커서 */
        .revealed-cursor {
            cursor: pointer !important;
        }
    </style>
</head>
<body id="bg">

    <h1 id="text" class="hidden-text">hello</h1>

    <div class="controller">
        <input type="range" id="slider" min="0" max="100" value="0">
    </div>

    <script>
        const slider = document.getElementById('slider');
        const text = document.getElementById('text');
        const bg = document.getElementById('bg');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            
            // 배경색만 점진적으로 흰색(#ffffff)으로 변경
            // #00fff0(0, 255, 240) -> #ffffff(255, 255, 255)
            const r = Math.round(0 + (val * 2.55));
            const g = 255; 
            const b = Math.round(240 + (val * 0.15));
            
            bg.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

            // 슬라이더 수치가 높을 때만 클릭 이벤트 활성화 (글자색/크기는 고정)
            if (val > 80) {
                text.classList.add('revealed-cursor');
                text.onclick = () => {
                    window.location.href = "https://your-next-page.com";
                };
            } else {
                text.classList.remove('revealed-cursor');
                text.onclick = null;
            }
        });
    </script>
</body>
</html>
