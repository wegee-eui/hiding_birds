<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Stegano Entrance</title>
    <style>
        :root { --accent: #00ff88; }
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }

        /* 이미지 영역 */
        #stego-container {
            position: relative;
            margin-bottom: 50px;
            transition: transform 0.5s;
        }

        #stego-image {
            width: 400px;
            filter: brightness(1); /* 초기 상태: 거의 아무것도 안 보임 */
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: default;
        }

        /* 슬라이더(막대) 스타일링 */
        .slider-wrapper { width: 300px; text-align: center; }
        
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent); /* 슬라이더 포인트 색상 */
        }

        .hint { font-size: 0.8rem; color: #444; margin-top: 10px; transition: color 0.3s; }
        
        /* 메시지가 발견되었을 때의 효과 */
        .revealed #stego-image {
            cursor: pointer;
            outline: 2px solid var(--accent);
            box-shadow: 0 0 30px var(--accent);
        }
    </style>
</head>
<body>

<div id="stego-container">
    <img id="stego-image" src="your_stego_image.png" alt="Deep Black">
</div>

<div class="slider-wrapper">
    <input type="range" id="brightness-slider" min="1" max="150" value="1">
    <div id="hint-text" class="hint">진실은 어둠 속에 있습니다...</div>
</div>

<script>
    const slider = document.getElementById('brightness-slider');
    const img = document.getElementById('stego-image');
    const container = document.getElementById('stego-container');
    const hint = document.getElementById('hint-text');

    slider.addEventListener('input', (e) => {
        const val = e.target.value;
        
        // 1. 밝기 필터 적용 (수치를 대폭 높여 숨겨진 픽셀 노출)
        img.style.filter = `brightness(${val})`;
        
        // 2. 일정 수치 이상 밝아지면 반응
        if (val > 100) {
            container.classList.add('revealed');
            hint.textContent = "메시지를 클릭하여 입장하세요";
            hint.style.color = "#00ff88";
            
            // 이미지 클릭 시 이동
            img.onclick = () => {
                window.location.href = "https://hidden-destination.com";
            };
        } else {
            container.classList.remove('revealed');
            hint.textContent = "더 밝게 조절해보세요...";
            hint.style.color = "#444";
            img.onclick = null;
        }
    });
</script>

</body>
</html>
