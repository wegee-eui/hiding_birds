<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Vertical Cylinder Thicket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>
<script>
    let planet, thicket;
    const planetRadius = 2500;
    const branchCount = 400; // 가지 개수
    let rotX = 0.4, rotY = 0;

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
        angleMode(DEGREES); // 뱀 코드와 동일하게 도(Degree) 단위 사용
        
        planet = buildGeometry(() => {
            noStroke();
            fill(255);
            sphere(planetRadius, 64, 64);
        });

        buildThicket();
    }

    function buildThicket() {
        if (thicket) freeGeometry(thicket);
        
        thicket = buildGeometry(() => {
            for (let i = 0; i < branchCount; i++) {
                // 1. 구 표면 좌표 결정
                let lon = random(360);
                let lat = acos(random(-1, 1)) * (180 / PI);
                
                let x = planetRadius * sin(lat) * cos(lon);
                let y = planetRadius * sin(lat) * sin(lon);
                let z = planetRadius * cos(lat);

                push();
                translate(x, y, z);
                
                // 2. 구체 표면에 수직으로 세우는 회전 로직 (구직 정렬)
                let v = createVector(x, y, z).normalize();
                let phi_rot = acos(v.z);
                let theta_rot = atan2(v.y, v.x);
                
                rotateZ(theta_rot);
                rotateY(phi_rot);
                rotateY(90); // 실린더가 바깥을 향하도록 최종 조정

                // 3. 뱀 몸통 사양으로 그리기 (Cylinder 활용)
                fill(10); // 검은색
                let numSegments = floor(random(5, 12)); // 마디 수
                let radius = random(15, 25); // 초기 굵기
                
                for (let segment = 0; segment < numSegments; segment++) {
                    // 수직성을 유지하기 위해 아주 미세한 각도 변화만 허용
                    rotateY(random(-5, 5)); 
                    
                    translate(40, 0, 0); // 마디 간격 이동
                    
                    push();
                    rotateZ(90); // 실린더 방향 정렬
                    // 뱀 코드처럼 끝으로 갈수록 가늘어지는 매핑 적용
                    let currentRadius = map(segment, numSegments - 3, numSegments, radius, 2, true);
                    cylinder(currentRadius, 80); 
                    pop();
                    
                    translate(40, 0, 0);
                }
                pop();
            }
        });
    }

    function draw() {
        background(240);

        if (mouseIsPressed) {
            rotY += (mouseX - pmouseX) * 0.2;
            rotX -= (mouseY - pmouseY) * 0.2;
        }

        camera(0, -planetRadius - 1000, 2200, 0, -planetRadius, 0, 0, 1, 0);

        // 광택용 조명 설정
        ambientLight(80);
        directionalLight(255, 255, 255, 1, 1, -1);
        pointLight(255, 255, 255, 0, -planetRadius - 2000, 1000);

        push();
        rotateY(rotY);
        rotateX(rotX);

        // 흰색 바닥 구체
        specularMaterial(255);
        model(planet);

        // 검은색 광택 실린더 가지
        specularMaterial(15); 
        shininess(200); // 뱀의 비늘 같은 강한 광택
        model(thicket);
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
