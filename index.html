<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairline Jungle Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; cursor: grab; }
        body:active { cursor: grabbing; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
    let lines = []; // 선들의 데이터를 저장할 배열
    let offsetX = 0; // 카메라 X 위치
    let offsetY = 0; // 카메라 Y 위치
    let worldSize = 4000; // 탐험할 수 있는 전체 맵의 크기

    function setup() {
        createCanvas(windowWidth, windowHeight);
        
        // 1. 선 숲 미리 생성 (한 번만 실행)
        // 화면보다 훨씬 큰 영역에 랜덤하게 선들을 배치합니다.
        for (let i = 0; i < 1500; i++) {
            lines.push(generateHairyLine());
        }
        
        // 시작 위치를 맵의 중앙으로 설정
        offsetX = -worldSize / 2 + width / 2;
        offsetY = -worldSize / 2 + height / 2;
    }

    function draw() {
        background(240); // 배경색

        // 2. 드래그 인터랙션 로직
        if (mouseIsPressed) {
            offsetX += mouseX - pmouseX;
            offsetY += mouseY - pmouseY;
        }

        push();
        translate(offsetX, offsetY); // 마우스 드래그만큼 화면 이동

        // 3. 미리 저장된 선들 그리기
        stroke(0, 0, 0, 60);
        strokeWeight(0.7);
        noFill();

        for (let l of lines) {
            // 성능을 위해 현재 화면에 보이는 선들만 그릴 수도 있지만, 
            // 이 정도 개수는 p5.js에서 충분히 돌아갑니다.
            beginShape();
            for (let v of l) {
                curveVertex(v.x, v.y);
            }
            endShape();
        }
        pop();
    }

    // 머리카락 한 가닥의 좌표 데이터를 생성하는 함수
    function generateHairyLine() {
        let points = [];
        let x = random(-worldSize, worldSize);
        let y = random(-worldSize, worldSize);
        let segments = random(20, 60); // 선의 길이 결정
        let noiseScale = 0.003;

        for (let i = 0; i < segments; i++) {
            let angle = noise(x * noiseScale, y * noiseScale) * TWO_PI * 4;
            x += cos(angle) * 10;
            y += sin(angle) * 10;
            points.push({x: x, y: y});
        }
        return points;
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
