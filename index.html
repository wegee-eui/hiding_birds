<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dense 3D Thicket Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; cursor: grab; }
        body:active { cursor: grabbing; }
    </style>
</head>
<body>

<script>
    let lines = [];
    const lineCount = 10000; // 요청하신 대로 압도적인 양 설정
    const worldSize = 5000;
    
    let camX = 0, camY = -300, camZ = 1500;

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
        // 덤불의 유기적인 꼬임을 위해 노이즈 디테일 설정
        noiseDetail(4, 0.5);

        for (let i = 0; i < lineCount; i++) {
            lines.push(generateThicketLine());
        }
    }

    function draw() {
        background(245);

        // 드래그 인터랙션: X축 이동 및 Z축(깊이) 탐험
        if (mouseIsPressed) {
            camX -= (mouseX - pmouseX) * 3;
            camZ -= (mouseY - pmouseY) * 8; 
        }

        // 원근감 및 카메라 설정
        perspective(PI / 2.5, width / height, 10, 15000);
        camera(camX, camY, camZ, camX, camY + 100, camZ - 1000, 0, 1, 0);

        noFill();
        
        // 성능을 위해 현재 카메라 주변의 선들만 렌더링 (성능 최적화)
        for (let l of lines) {
            let d = abs(l.z - camZ);
            if (d > 4000) continue; // 너무 먼 선은 그리지 않음

            let alpha = map(d, 0, 4000, 180, 0);
            stroke(0, alpha);
            strokeWeight(l.weight);
            
            beginShape();
            for (let v of l.points) {
                vertex(v.x, v.y, v.z);
            }
            endShape();
        }
    }

    function generateThicketLine() {
        let points = [];
        // 시작점을 넓게 퍼뜨려 덤불의 기반 형성
        let x = random(-worldSize, worldSize);
        let z = random(-worldSize, worldSize);
        let y = 600; // 바닥 높이
        
        const startZ = z;
        const segments = random(15, 40); // 한 가닥의 길이
        const step = 25; // 마디의 크기

        for (let i = 0; i < segments; i++) {
            // 3D Perlin Noise로 덤불처럼 뒤엉키는 경로 계산
            let n = noise(x * 0.005, y * 0.005, z * 0.005);
            let angleH = n * TWO_PI * 4;
            let angleV = n * PI * 2;

            x += cos(angleH) * step;
            y -= sin(angleV) * step; // 위로 솟구치거나 아래로 꺾임
            z += sin(angleH) * step;

            points.push({x: x, y: y, z: z});
        }

        return {
            points: points,
            weight: random(0.2, 0.7),
            z: startZ
        };
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
