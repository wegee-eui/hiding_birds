<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hairline Jungle Exploration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f4f4f4; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
    let noiseScale = 0.005; // 구불거림의 정도 (작을수록 완만함)

    function setup() {
        createCanvas(windowWidth, windowHeight);
        background(244, 244, 244);
        
        // 1. 초기 '정글' 생성: 화면에 이미 수백 개의 선을 뿌려둡니다.
        for (let i = 0; i < 400; i++) {
            drawHairyLine(random(width), random(height), random(100, 400));
        }
    }

    function draw() {
        // 2. 탐험 인터랙션: 마우스를 움직이기만 해도 궤적을 따라 선이 얽힘
        if (mouseX !== 0 && mouseY !== 0) {
            drawHairyLine(mouseX, mouseY, random(50, 150));
        }
    }

    // 머리카락 같은 선을 그리는 핵심 함수
    function drawHairyLine(x, y, length) {
        push();
        noFill();
        stroke(0, 0, 0, 30); // 아주 투명하고 얇은 검은 선
        strokeWeight(0.5);
        
        beginShape();
        for (let i = 0; i < length; i += 5) {
            // Perlin Noise를 사용하여 유기적이고 자연스러운 구불거림 생성
            let angle = noise(x * noiseScale, y * noiseScale, i * 0.01) * TWO_PI * 2;
            
            // 선이 나아가는 방향 계산
            x += cos(angle) * 5;
            y += sin(angle) * 5;
            
            // 화면 밖으로 나가면 중단
            if (x < 0 || x > width || y < 0 || y > height) break;
            
            curveVertex(x, y);
        }
        endShape();
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(244, 244, 244);
        // 리사이즈 시 다시 정글 생성
        for (let i = 0; i < 400; i++) {
            drawHairyLine(random(width), random(height), random(100, 400));
        }
    }
</script>
</body>
</html>
